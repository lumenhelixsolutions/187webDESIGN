name: Deploy showcase to GitHub Pages

# Builds the showcase as a fully static site and publishes it to GitHub Pages.
# The full-stack app (Prisma + API routes) is excluded from this build — Pages
# can't run a server — so the deployed site is the visual showcase only.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      NEXT_PUBLIC_SITE_URL: "https://lumenhelixsolutions.github.io/187webDESIGN"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only API routes (incompatible with static export)
        run: rm -rf app/api

      - name: Build static export
        run: npx next build

      - name: Disable Jekyll (serve _next/ assets verbatim)
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
